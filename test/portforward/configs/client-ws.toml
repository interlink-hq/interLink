# Rathole client config – WebSocket transport mode.
# Mirrors the TOML generated by addWstunnelClientAnnotation when TunnelType=="rathole"
# and RatholeCAIssuerName is empty (the DefaultRatholeWSCommand path).
# The client connects over WebSocket; in production it would go through nginx on port 80.
[client]
remote_addr = "rathole-server-ws:2334"

[client.transport]
type = "websocket"

[client.transport.websocket]
tls = false

[client.services.http]
token = "interlink-test-token"
local_addr = "backend:80"
