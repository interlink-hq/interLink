server {
    listen 80;
    server_name _;
    location / {
        return 200 "Hello from remote backend (port 80)\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 9090;
    server_name _;
    location / {
        return 200 "Metrics from remote backend (port 9090)\n";
        add_header Content-Type text/plain;
    }
}
