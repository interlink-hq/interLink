apiVersion: v1
kind: ConfigMap
metadata:
  name: {{.Name}}-rathole-config
  namespace: {{.Namespace}}
data:
  server.toml: |
    [server]
    bind_addr = "0.0.0.0:2333"
    {{- range .ExposedPorts}}
    {{- if ne .Protocol "UDP"}}

    [server.services.p{{.Port}}]
    token = "{{$.RandomPassword}}"
    bind_addr = "0.0.0.0:{{.Port}}"
    {{- end}}
    {{- end}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Name}}
  namespace: {{.Namespace}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: {{.Name}}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{.Name}}
    spec:
      containers:
      - name: rathole
        # Docker Hub image published by https://github.com/rathole-org/rathole CI
        image: rapiz1/rathole:v0.5.0
        imagePullPolicy: IfNotPresent
        args: ["--server", "/etc/rathole/server.toml"]
        ports:
        - containerPort: 2333
          name: control
          protocol: TCP
        {{- range .ExposedPorts}}
        {{- if ne .Protocol "UDP"}}
        - containerPort: {{.Port}}
          name: {{if .Name}}{{.Name}}{{else}}port-{{.Port}}{{end}}
          protocol: TCP
        {{- end}}
        {{- end}}
        volumeMounts:
        - name: rathole-config
          mountPath: /etc/rathole
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
        readinessProbe:
          tcpSocket:
            port: 2333
          initialDelaySeconds: 2
          periodSeconds: 2
          failureThreshold: 10
        livenessProbe:
          tcpSocket:
            port: 2333
          initialDelaySeconds: 10
          periodSeconds: 10
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
      - name: rathole-config
        configMap:
          name: {{.Name}}-rathole-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{.Name}}
  namespace: {{.Namespace}}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: {{.Name}}
  ports:
    - port: 2333
      targetPort: 2333
      name: control
      protocol: TCP
    {{- range .ExposedPorts}}
    {{- if ne .Protocol "UDP"}}
    {{- if ne .Port 2333}}{{/* skip control port 2333 to avoid conflicts with the rathole server listener */}}
    - port: {{.Port}}
      targetPort: {{.Port}}
      name: {{if .Name}}{{.Name}}{{else}}port-{{.Port}}{{end}}
      protocol: TCP
    {{- end}}
    {{- end}}
    {{- end}}
{{- if .HasNginxIngress}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{.Name}}
  namespace: {{.Namespace}}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/server-snippets: |
      location / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: rathole-{{.Name}}.{{.WildcardDNS}}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{.Name}}
            port:
              number: 2333
{{- end}}
